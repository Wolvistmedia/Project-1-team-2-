<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Optima — Marketing Chatbot</title>
<style>
  /* ── Google Font ── */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #f4f4f8;
    min-height: 100vh;
  }

  /* ── Demo page placeholder ── */
  .page-hero {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; text-align: center; padding: 2rem;
  }
  .page-hero h1 { font-size: 2.4rem; font-weight: 600; color: #0f0f23; }
  .page-hero p  { margin-top: 0.75rem; color: #666; font-size: 1.05rem; }
  .badge {
    margin-top: 1.5rem;
    display: inline-block;
    background: #0f0f23; color: #3ECFCF;
    padding: 8px 20px; border-radius: 30px;
    font-size: 13px; font-weight: 500; letter-spacing: 0.3px;
  }

  /* ════════════════════════════════
     FLOATING BUBBLE
  ════════════════════════════════ */
  #chat-bubble-btn {
    position: fixed; bottom: 28px; right: 28px;
    width: 60px; height: 60px; border-radius: 50%;
    background: linear-gradient(135deg, #6C63FF, #3ECFCF);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 6px 24px rgba(108,99,255,0.45);
    z-index: 9999;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  #chat-bubble-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 10px 30px rgba(108,99,255,0.55);
  }
  #chat-bubble-btn svg { width: 26px; height: 26px; }

  /* notification dot */
  #chat-bubble-btn::after {
    content: '';
    position: absolute; top: 4px; right: 4px;
    width: 12px; height: 12px; border-radius: 50%;
    background: #ff5a5a; border: 2px solid #fff;
    animation: pulse-dot 2s infinite;
  }
  @keyframes pulse-dot {
    0%,100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.3); opacity: 0.7; }
  }

  /* ════════════════════════════════
     CHAT WINDOW
  ════════════════════════════════ */
  #chat-window {
    position: fixed; bottom: 100px; right: 28px;
    width: 360px; height: 540px;
    background: #fff; border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.18);
    display: flex; flex-direction: column;
    overflow: hidden; z-index: 9998;
    transform: scale(0.85) translateY(20px);
    opacity: 0; pointer-events: none;
    transform-origin: bottom right;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s ease;
  }
  #chat-window.open {
    transform: scale(1) translateY(0);
    opacity: 1; pointer-events: all;
  }

  /* Header */
  #chat-header {
    background: #0f0f23;
    padding: 14px 16px;
    display: flex; align-items: center; gap: 11px;
    flex-shrink: 0;
  }
  .av {
    width: 36px; height: 36px; border-radius: 50%;
    background: linear-gradient(135deg, #6C63FF, #3ECFCF);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .hname { color: #fff; font-size: 14px; font-weight: 600; }
  .hst {
    color: #3ECFCF; font-size: 11px;
    display: flex; align-items: center; gap: 5px; margin-top: 2px;
  }
  .hst::before {
    content: ''; width: 6px; height: 6px;
    border-radius: 50%; background: #3ECFCF; display: inline-block;
    animation: pulse-dot 1.8s infinite;
  }
  #close-btn {
    margin-left: auto; background: none; border: none;
    color: rgba(255,255,255,0.5); cursor: pointer;
    font-size: 20px; line-height: 1; padding: 2px 6px;
    border-radius: 6px; transition: background 0.15s, color 0.15s;
  }
  #close-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }

  /* Messages area */
  #messages {
    flex: 1; overflow-y: auto; padding: 14px 12px;
    display: flex; flex-direction: column; gap: 10px;
    background: #f7f7fb;
    scroll-behavior: smooth;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

  .msg-wrap {
    display: flex; align-items: flex-end; gap: 7px;
    max-width: 90%; animation: slide-up 0.22s ease;
  }
  @keyframes slide-up {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-wrap.user { align-self: flex-end; flex-direction: row-reverse; }

  .bot-ic {
    width: 26px; height: 26px; border-radius: 50%;
    background: linear-gradient(135deg, #6C63FF, #3ECFCF);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .bubble {
    padding: 10px 13px; border-radius: 16px;
    font-size: 13.5px; line-height: 1.65; white-space: pre-line;
    max-width: 260px;
  }
  .msg-wrap.bot  .bubble { background: #fff; color: #1a1a2e; border: 1px solid #e8e8f0; border-radius: 4px 16px 16px 16px; }
  .msg-wrap.user .bubble { background: #0f0f23; color: #fff; border-radius: 16px 4px 16px 16px; }

  /* Quick replies */
  .quick-row {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding-left: 33px; margin-top: -2px;
  }
  .qb {
    background: #fff; border: 1px solid #6C63FF;
    color: #6C63FF; border-radius: 20px;
    padding: 5px 12px; font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer; transition: background 0.15s, color 0.15s;
  }
  .qb:hover { background: #6C63FF; color: #fff; }

  /* Typing dots */
  .typing-dots {
    display: flex; align-items: center; gap: 4px;
    padding: 10px 13px;
  }
  .typing-dots span {
    width: 7px; height: 7px; border-radius: 50%;
    background: #aaa; animation: bounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce {
    0%,80%,100% { transform: scale(0.65); opacity: 0.4; }
    40%          { transform: scale(1); opacity: 1; }
  }

  /* Input area */
  #input-area {
    padding: 10px 12px;
    border-top: 1px solid #eee;
    display: flex; gap: 8px; align-items: center;
    background: #fff; flex-shrink: 0;
  }
  #user-input {
    flex: 1; border: 1px solid #e0e0ec; border-radius: 22px;
    padding: 9px 15px; font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    outline: none; color: #1a1a2e;
    background: #f7f7fb;
    transition: border-color 0.15s;
  }
  #user-input:focus { border-color: #6C63FF; background: #fff; }
  #send-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: #0f0f23; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.15s;
  }
  #send-btn:hover { opacity: 0.78; }
</style>
</head>
<body>

<!-- Demo Page -->
<div class="page-hero">
  <h1>AI Optima Marketing</h1>
  <p>Next-gen AI-powered marketing for startups & businesses.</p>
  <span class="badge">💬 Chat with us — bottom right corner</span>
</div>

<!-- Floating Bubble Button -->
<button id="chat-bubble-btn" title="Chat with us" onclick="toggleChat()">
  <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
  </svg>
</button>

<!-- Chat Window -->
<div id="chat-window">
  <div id="chat-header">
    <div class="av">AI</div>
    <div>
      <div class="hname">Optima Assistant</div>
      <div class="hst">Online — ready to help</div>
    </div>
    <button id="close-btn" onclick="toggleChat()">✕</button>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <input id="user-input" type="text" placeholder="Type a message..." autocomplete="off"/>
    <button id="send-btn" onclick="sendMsg()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
           stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
/* ─────────────────────────────────────
   KNOWLEDGE BASE
───────────────────────────────────── */
const KB = [
  {
    keys: ['hi','hello','hey','good morning','good evening','howdy','sup'],
    text: "👋 Hi! Welcome to AI Optima!\n\nI can help you with our services, pricing, process, or booking a free consultation.\n\nWhat would you like to know?",
    quick: ["Our Services","Pricing","Book Free Call","See Results"]
  },
  {
    keys: ['service','services','offer','what do you do','specialize','marketing'],
    text: "We offer full AI-powered marketing:\n\n🔍 SEO & Content Marketing\n📱 Social Media Management\n💰 Paid Ads (Google & Meta)\n🎨 Brand Strategy & Design\n📧 Email Marketing\n\nWhich one interests you most?",
    quick: ["SEO","Social Media","Paid Ads","Branding","Email Marketing"]
  },
  {
    keys: ['seo','search engine','content','organic','blog','rank','ranking'],
    text: "Our SEO service includes:\n\n✅ Keyword research & on-page SEO\n✅ Technical audit & fixes\n✅ Blog & content writing\n✅ Link building\n✅ Monthly ranking reports\n\nMost clients see results in 60–90 days!",
    quick: ["SEO Pricing","Free Audit","Other Services"]
  },
  {
    keys: ['social','instagram','facebook','linkedin','tiktok','reels'],
    text: "Our Social Media service covers:\n\n✅ Content calendar & strategy\n✅ Daily posts & Reels creation\n✅ Community management\n✅ Growth analytics\n\nWe manage IG, FB, LinkedIn & TikTok!",
    quick: ["Social Pricing","Book a Call","Other Services"]
  },
  {
    keys: ['paid','ads','advertising','ppc','google ads','meta ads','facebook ads'],
    text: "Our Paid Ads service delivers real ROI:\n\n✅ Google & Meta Ads setup\n✅ Ad copywriting & creatives\n✅ A/B testing\n✅ Weekly performance reports\n\nTypical ROAS: 3–5x for our clients! 🚀",
    quick: ["Ads Pricing","Book a Call","Other Services"]
  },
  {
    keys: ['brand','branding','logo','identity','design'],
    text: "Our Brand Strategy service:\n\n✅ Brand positioning & messaging\n✅ Logo & visual identity\n✅ Brand guidelines\n✅ Tone of voice\n\nA strong brand = stronger marketing results!",
    quick: ["Brand Pricing","Book a Call","Other Services"]
  },
  {
    keys: ['email','newsletter','drip','automation','mailchimp'],
    text: "Our Email Marketing service:\n\n✅ Campaign strategy & writing\n✅ Template design\n✅ Automated drip sequences\n✅ Open rate optimization\n\nEmail delivers up to 42x ROI — the highest of any channel!",
    quick: ["Email Pricing","Book a Call","Other Services"]
  },
  {
    keys: ['price','pricing','cost','how much','package','plan','budget','fee','rate','charge','affordable'],
    text: "Here are our packages:\n\n🚀 Starter — ₹15,000/mo\n1 service + basic reporting\n\n⚡ Growth — ₹35,000/mo\n3 services + dedicated manager\n\n🏆 Pro — ₹65,000/mo\nFull-stack team + priority support\n\nCustom plans also available!",
    quick: ["Book Free Consultation","What's included?","Talk to Team"]
  },
  {
    keys: ['how it works','process','workflow','steps','start','get started','onboarding','begin'],
    text: "Our simple 5-step process:\n\n1️⃣ Free Discovery Call (30 min)\n2️⃣ Custom Strategy built for you\n3️⃣ Onboarding & tool setup (Week 1)\n4️⃣ Execution by our team\n5️⃣ Weekly/monthly reports\n\nTransparent. Results-driven. Simple.",
    quick: ["Book Free Call","Pricing","Services"]
  },
  {
    keys: ['book','consultation','call','meeting','schedule','demo','contact','reach','get in touch','appointment'],
    text: "Let's book your FREE 30-min consultation! 🎉\n\nYou'll get:\n✅ Review of your current marketing\n✅ Custom growth recommendations\n✅ Clear action plan — no strings!\n\n📧 hello@aioptima.com\n📞 +91 98765 43210\n🌐 aioptima.com/book",
    quick: ["Pricing","Our Services","How it works"]
  },
  {
    keys: ['result','results','case study','roi','proof','clients','success','portfolio'],
    text: "Recent client results:\n\n📈 3.2x organic traffic (SaaS, 4 months)\n💰 4.8x ROAS on Meta Ads\n📱 +12,000 IG followers in 60 days\n📧 47% email open rate (avg is 20%)\n\nBook a call to see what's possible for you!",
    quick: ["Book Free Call","Pricing","Services"]
  },
  {
    keys: ['timeline','how long','when','weeks','months','quick'],
    text: "Realistic timelines:\n\n📅 Week 1–2: Strategy & onboarding\n📅 Month 1: Setup & foundation\n📅 Month 2–3: Early results\n📅 Month 4+: Compounding growth\n\nPaid ads: results in week 1.\nSEO: 60–90 days. Social: 30–60 days.",
    quick: ["Book Free Call","Pricing","Services"]
  },
  {
    keys: ['about','who are you','company','team','founded','tell me about'],
    text: "AI Optima is a next-gen marketing agency for startups & businesses.\n\nWe combine AI tools + human strategy for faster, smarter results.\n\n👥 15+ marketers, designers & analysts\n🌍 Serving clients across India & globally\n🏆 50+ brands grown so far",
    quick: ["Our Services","Book a Call","See Results"]
  },
  {
    keys: ['thank','thanks','great','awesome','perfect','helpful','nice','cool','good'],
    text: "You're very welcome! 😊\n\nFeel free to ask anything else, or book a free call to get started with AI Optima!",
    quick: ["Book Free Call","Our Services","Pricing"]
  }
];

/* ─────────────────────────────────────
   CHAT LOGIC
───────────────────────────────────── */
const msgArea = document.getElementById('messages');
const inputEl = document.getElementById('user-input');
let chatOpen = false;

function toggleChat() {
  chatOpen = !chatOpen;
  document.getElementById('chat-window').classList.toggle('open', chatOpen);
  if (chatOpen && msgArea.children.length === 0) startChat();
  if (chatOpen) setTimeout(() => inputEl.focus(), 300);
}

function startChat() {
  addBotMsg(
    "👋 Hi! Welcome to AI Optima — your growth partner!\n\nHow can I help you today?",
    ["Our Services","Pricing & Plans","Book Free Call","See Results"]
  );
}

function getReply(text) {
  const t = text.toLowerCase();
  for (const entry of KB) {
    if (entry.keys.some(k => t.includes(k))) return entry;
  }
  return {
    text: "Great question! Our team would love to answer this in detail.\n\nBook a free consultation and we'll cover everything specific to your business!\n\n📧 hello@aioptima.com",
    quick: ["Book Free Call","Our Services","Pricing"]
  };
}

function addBotMsg(text, quick = []) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot';
  const ic = document.createElement('div');
  ic.className = 'bot-ic'; ic.textContent = 'AI';
  const bub = document.createElement('div');
  bub.className = 'bubble'; bub.textContent = text;
  wrap.appendChild(ic); wrap.appendChild(bub);
  msgArea.appendChild(wrap);

  if (quick.length) {
    const row = document.createElement('div');
    row.className = 'quick-row';
    quick.forEach(q => {
      const btn = document.createElement('button');
      btn.className = 'qb'; btn.textContent = q;
      btn.onclick = () => { row.remove(); sendMsg(q); };
      row.appendChild(btn);
    });
    msgArea.appendChild(row);
  }
  msgArea.scrollTop = msgArea.scrollHeight;
}

function addUserMsg(text) {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap user';
  const bub = document.createElement('div');
  bub.className = 'bubble'; bub.textContent = text;
  wrap.appendChild(bub);
  msgArea.appendChild(wrap);
  msgArea.scrollTop = msgArea.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg-wrap bot'; wrap.id = 'typing';
  const ic = document.createElement('div');
  ic.className = 'bot-ic'; ic.textContent = 'AI';
  const bub = document.createElement('div');
  bub.className = 'bubble typing-dots';
  bub.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(ic); wrap.appendChild(bub);
  msgArea.appendChild(wrap);
  msgArea.scrollTop = msgArea.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function sendMsg(text) {
  const msg = text || inputEl.value.trim();
  if (!msg) return;
  inputEl.value = '';
  addUserMsg(msg);
  showTyping();
  setTimeout(() => {
    hideTyping();
    const reply = getReply(msg);
    addBotMsg(reply.text, reply.quick);
  }, 700 + Math.random() * 500);
}

/* keyboard send */
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter') sendMsg();
});
</script>
</body>
</html>
